<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- TaxOps - Isotipo Negativo (blanco sobre colores) -->
  
  <!-- Fondo con degradado: Azul a Naranja (muestra uso) -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E05519;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="512" height="512" fill="url(#bgGradient)"/>

  <!-- ISOTIPO NEGATIVO: Engranaje + Símbolo (Blanco) -->
  <g transform="translate(256, 256)">
    <!-- Círculo base del engranaje -->
    <circle cx="0" cy="0" r="160" fill="none" stroke="white" stroke-width="12" opacity="0.2"/>
    
    <!-- 8 Dientes del engranaje -->
    <rect x="-20" y="-200" width="40" height="60" fill="white" rx="8"/>
    <g transform="rotate(45)">
      <rect x="-20" y="-200" width="40" height="60" fill="white" rx="8"/>
    </g>
    <g transform="rotate(90)">
      <rect x="-20" y="-200" width="40" height="60" fill="white" rx="8"/>
    </g>
    <g transform="rotate(135)">
      <rect x="-20" y="-200" width="40" height="60" fill="white" rx="8"/>
    </g>
    <g transform="rotate(180)">
      <rect x="-20" y="-200" width="40" height="60" fill="white" rx="8"/>
    </g>
    <g transform="rotate(225)">
      <rect x="-20" y="-200" width="40" height="60" fill="white" rx="8"/>
    </g>
    <g transform="rotate(270)">
      <rect x="-20" y="-200" width="40" height="60" fill="white" rx="8"/>
    </g>
    <g transform="rotate(315)">
      <rect x="-20" y="-200" width="40" height="60" fill="white" rx="8"/>
    </g>

    <!-- Centro del engranaje -->
    <circle cx="0" cy="0" r="80" fill="url(#bgGradient)"/>

    <!-- SÍMBOLO INTERIOR: % Grid (Blanco) -->
    <circle cx="-30" cy="-35" r="22" fill="none" stroke="white" stroke-width="10"/>
    <circle cx="30" cy="35" r="22" fill="none" stroke="white" stroke-width="10"/>
    <line x1="-48" y1="48" x2="48" y2="-48" stroke="white" stroke-width="10" stroke-linecap="round"/>

    <!-- Grid 3x3 -->
    <line x1="-35" y1="-30" x2="-35" y2="30" stroke="white" stroke-width="6" opacity="0.35"/>
    <line x1="0" y1="-30" x2="0" y2="30" stroke="white" stroke-width="6" opacity="0.35"/>
    <line x1="35" y1="-30" x2="35" y2="30" stroke="white" stroke-width="6" opacity="0.35"/>
    
    <line x1="-35" y1="-30" x2="35" y2="-30" stroke="white" stroke-width="6" opacity="0.35"/>
    <line x1="-35" y1="0" x2="35" y2="0" stroke="white" stroke-width="6" opacity="0.35"/>
    <line x1="-35" y1="30" x2="35" y2="30" stroke="white" stroke-width="6" opacity="0.35"/>
  </g>
</svg>
